<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>THE VAULT</title>

    <link rel="stylesheet" href="/styles.css">

    <meta
        http-equiv="Permissions-Policy"
        content="fullscreen=*, gamepad=*, autoplay=*"
    >
</head>

<body>

    <div id="login-screen">

        <div class="login-box">

            <h1>
                THE <span>VAULT</span>
            </h1>

            <input
                id="password"
                type="password"
                placeholder="Enter Password"
                autocomplete="off"
            >

            <button id="login-button">
                Enter
            </button>

            <div id="error">
                Incorrect password
            </div>

        </div>

    </div>


    <div id="site">

        <header>

            <div class="logo">
                THE <span>VAULT</span>
            </div>

            <div class="header-right">

                <div class="status">
                    Status:
                    <span>Online</span>
                </div>

                <button
                    class="logout-btn"
                    id="logout-button"
                >
                    Logout
                </button>

            </div>

        </header>


        <main class="container">

            <div class="intro">

                <h2>
                    🎮 Game Collection
                </h2>

                <p>
                    Select a game to launch.
                </p>

            </div>


            <div class="filters">

                <div class="search">

                    <input
                        id="search"
                        type="text"
                        placeholder="🔍 Search games..."
                        autocomplete="off"
                    >

                </div>


                <div class="category-filter">

                    <select id="category">

                        <option value="all">
                            All Categories
                        </option>

                        <option value="action">
                            Action
                        </option>

                        <option value="puzzle">
                            Puzzle
                        </option>

                        <option value="strategy">
                            Strategy
                        </option>

                        <option value="sports">
                            Sports
                        </option>

                        <option value="casual">
                            Casual
                        </option>

                        <option value="multiplayer">
                            Multiplayer
                        </option>

                        <option value="retro">
                            Retro
                        </option>

                    </select>

                </div>

            </div>


            <div class="stats">

                <span id="game-count">
                    Loading games...
                </span>

            </div>


            <div
                class="grid"
                id="games"
            ></div>

        </main>

    </div>


    <div id="player">

        <div class="player-header">

            <div class="player-info">

                <div
                    class="player-title"
                    id="player-title"
                >
                    Game
                </div>

                <span
                    class="player-category"
                    id="player-category"
                ></span>

            </div>


            <div class="player-controls">

                <button
                    class="fullscreen-btn"
                    id="fullscreen-button"
                >
                    ⛶ Fullscreen
                </button>

                <button
                    class="close"
                    id="close-button"
                >
                    ✕ Close
                </button>

            </div>

        </div>


        <div id="iframe-container">

            <iframe
                id="game-frame"
                title="Game"
                allowfullscreen
                allow="
                    fullscreen;
                    autoplay;
                    gamepad;
                    microphone;
                    camera;
                    clipboard-read;
                    clipboard-write
                "
            ></iframe>

        </div>

    </div>


    <div
        id="loading"
        class="loading-indicator"
    >

        <div class="spinner"></div>

        <p>
            Loading game...
        </p>

    </div>


    <script src="/script.js"></script>

</body>
</html>
